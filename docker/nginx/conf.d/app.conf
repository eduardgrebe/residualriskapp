# Residual Risk Estimator - nginx reverse proxy reference configuration
#
# This is a REFERENCE configuration for an external nginx reverse proxy.
# SSL termination is handled here, NOT inside the Docker container.
#
# The Docker container binds only to 127.0.0.1:8501, so only the host
# (and this reverse proxy) can reach it.
#
# Replace YOUR_DOMAIN with your actual domain name.
# SSL certificate management (e.g. via certbot/Let's Encrypt or your own
# certificate) is left to the operator.

upstream streamlit {
    server 127.0.0.1:8501;
}

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name YOUR_DOMAIN;

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS reverse proxy
server {
    listen 443 ssl http2;
    server_name YOUR_DOMAIN;

    # SSL certificates - provide your own (e.g. via certbot, acme.sh, etc.)
    ssl_certificate     /etc/ssl/certs/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/ssl/private/YOUR_DOMAIN/privkey.pem;

    # Mozilla Intermediate TLS configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    location / {
        proxy_pass http://streamlit;
        proxy_http_version 1.1;

        # WebSocket support (required for Streamlit)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Standard proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts (important for long-running simulations)
        proxy_connect_timeout 300;
        proxy_send_timeout 300;
        proxy_read_timeout 300;
        send_timeout 300;

        proxy_buffering off;
        proxy_cache off;
    }
}
